<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroSpark Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg1: #0f0c29;
        --bg2: #302b63;
        --accent1: #4361ee;
        --accent2: #7209b7;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.72);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: linear-gradient(135deg, var(--bg1), var(--bg2));
        color: var(--text);
      }
      .card {
        width: min(92vw, 28rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
        text-align: center;
      }
      .icon {
        width: 4.5rem;
        height: 4.5rem;
        margin: 0 auto 1rem;
        border-radius: 1.25rem;
        display: grid;
        place-items: center;
        font-size: 2.2rem;
        background: linear-gradient(135deg, var(--accent1), var(--accent2));
      }
      p {
        margin: 0.5rem 0 0;
        color: var(--muted);
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon">🧠</div>
      <h1>NeuroSpark is offline</h1>
      <p>Local profiles, history, and saved content still work once the app shell is loaded.</p>
      <p>AI Counselor, analytics, and checkout need an internet connection.</p>
    </main>
  </body>
</html>
