# Build a debug APK in the cloud (GitHub Actions).
#
# How to use:
# 1. Push this workflow to your default branch on GitHub.
# 2. GitHub → Actions → "Build Android APK (debug)" → Run workflow, OR push to
#    main/master / version tags (v*).
# 3. When it finishes, open the run → Artifacts → download neurospark-debug-apk.zip
#    → unzip → app-debug.apk
#
# Requires JDK 21 to match `android/app/capacitor.build.gradle` (Capacitor sets
# sourceCompatibility/targetCompatibility to Java 21).
#
# Optional secrets (for a fully wired production build in CI): VITE_ADMIN_EMAILS,
# VITE_SUPABASE_PROJECT_ID, VITE_SUPABASE_ANON_KEY — the app still builds if unset.

name: Build Android APK (debug)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - "v*"

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web + Capacitor sync
        env:
          VITE_APP_ENV: production
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS || '' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || '' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}
        run: pnpm run build:mobile

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            android/**/*.gradle*
            android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neurospark-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
