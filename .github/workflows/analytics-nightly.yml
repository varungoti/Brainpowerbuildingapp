name: analytics-nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "etl/**"
      - ".github/workflows/analytics-nightly.yml"

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: etl
    env:
      SOURCE_PG_URL: ${{ secrets.SOURCE_PG_URL }}
      TARGET_NEON_URL: ${{ secrets.TARGET_NEON_URL }}
      NEON_HOST: ${{ secrets.NEON_HOST }}
      NEON_USER: ${{ secrets.NEON_USER }}
      NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
      NEON_DB: ${{ secrets.NEON_DB }}
      DBT_PROFILES_DIR: ./
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Sync Supabase → Neon raw.*
        run: python sync_supabase.py

      - name: dbt deps
        run: dbt deps

      - name: dbt run
        run: dbt run --target prod

      - name: dbt test
        run: dbt test --target prod

      - name: Notify on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'content-type: application/json' \
            -d '{"text":":rotating_light: analytics-nightly failed on '"$GITHUB_RUN_ID"'"}'
