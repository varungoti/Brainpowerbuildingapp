name: marketing-site

on:
  push:
    branches: [main]
    paths:
      - "marketing-site/**"
      - ".github/workflows/marketing-site.yml"
  pull_request:
    paths:
      - "marketing-site/**"
  workflow_dispatch:

jobs:
  build-and-perf:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults: { run: { working-directory: marketing-site } }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: marketing-site/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Lighthouse CI
        run: |
          npm i -g @lhci/cli@0.14.0
          lhci autorun

  deploy:
    needs: build-and-perf
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults: { run: { working-directory: marketing-site } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: marketing-site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=neurospark-marketing --branch=main
          workingDirectory: marketing-site
