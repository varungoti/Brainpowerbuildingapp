name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Validate content metadata
        run: pnpm run content:validate

      - name: AGE quality report
        run: pnpm run age:report

      - name: Build
        env:
          # Expose version to Vite define plugin (already injected from package.json,
          # but explicit here for clarity in CI logs).
          VITE_APP_ENV: production
          # VITE_ADMIN_EMAILS must be set in repo Secrets for admin Blueprint access.
          # If the secret is absent, Blueprint is locked to no one (safe default).
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS || '' }}
        run: pnpm run build

      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        env:
          E2E_SKIP_BUILD: "1"
        run: pnpm run test:e2e

      - name: Upload E2E test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
